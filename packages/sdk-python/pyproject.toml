[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "docuforge"
version = "0.1.0"
description = "DocuForge - PDF generation API for developers. HTML in, pixel-perfect PDF out."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{ name = "DocuForge" }]
keywords = ["pdf", "html-to-pdf", "pdf-generation", "api"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx>=0.24",
    "pydantic>=2.0",
]

[project.urls]
Homepage = "https://docuforge.dev"
Documentation = "https://docs.docuforge.dev"
Repository = "https://github.com/docuforge/docuforge-python"
