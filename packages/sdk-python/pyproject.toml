[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "deckle"
version = "0.5.0"
description = "Deckle - PDF generation API for developers. HTML in, pixel-perfect PDF out."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{ name = "Deckle" }]
keywords = ["pdf", "html-to-pdf", "pdf-generation", "api"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx>=0.24",
    "pydantic>=2.0",
]

[project.optional-dependencies]
test = ["pytest>=7", "respx>=0.20"]

[project.urls]
Homepage = "https://getdeckle.dev"
Documentation = "https://getdeckle.dev/docs"
Repository = "https://github.com/Yoshyaes/deckle/deckle-python"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
