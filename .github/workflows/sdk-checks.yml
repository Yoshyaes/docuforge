name: SDK Checks

on:
  push:
    branches: [master]
    paths:
      - 'packages/sdk-*/**'
  pull_request:
    branches: [master]
    paths:
      - 'packages/sdk-*/**'

jobs:
  go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go vet ./...
      - run: go test ./...

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]" 2>/dev/null || pip install -e .
      - run: python -m py_compile docuforge/__init__.py
      - run: python -m py_compile docuforge/client.py
