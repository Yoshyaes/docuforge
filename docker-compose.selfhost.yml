# Self-hosted DocuForge stack
# Usage: docker compose -f docker-compose.selfhost.yml up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://docuforge:${POSTGRES_PASSWORD:-please_change_me}@postgres:5432/docuforge
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - PORT=3000
      - STORAGE_PROVIDER=local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    volumes:
      - pdf-storage:/app/.storage
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # One-shot container that pushes the DB schema before API starts
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      - DATABASE_URL=postgresql://docuforge:${POSTGRES_PASSWORD:-please_change_me}@postgres:5432/docuforge
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: docuforge
      POSTGRES_USER: docuforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-please_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  pgdata:
  redis-data:
  pdf-storage:
